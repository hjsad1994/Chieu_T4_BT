<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Success</title>
  <style>
    :root {
      --bg: #f3f9f7;
      --card: #ffffff;
      --text: #14532d;
      --border: #86efac;
      --button: #15803d;
      --button-hover: #166534;
    }

    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #ecfdf5, var(--bg));
      color: var(--text);
    }

    .success-card {
      width: min(92vw, 420px);
      text-align: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 20px;
      box-shadow: 0 10px 24px rgba(20, 83, 45, 0.1);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.4rem;
    }

    p {
      margin: 0 0 18px;
      color: #166534;
    }

    a {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      background: var(--button);
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 600;
    }

    a:hover {
      background: var(--button-hover);
    }
  </style>
</head>
<body>
  <main class="success-card">
    <h1>Dang nhap thanh cong</h1>
    <p>Chao mung ban da dang nhap voi tai khoan admin.</p>
    <a href="index.html">Quay lai trang dang nhap</a>
  </main>
</body>
</html>
