<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Login</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-hover: #0d5f59;
      --border: #d1d5db;
    }

    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eef2ff, var(--bg));
      color: var(--text);
    }

    .login-card {
      width: min(92vw, 360px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 1.25rem;
      text-align: center;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .error-message {
      min-height: 18px;
      margin: 8px 0 12px;
      color: #b91c1c;
      font-size: 0.88rem;
      text-align: center;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: var(--muted);
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--primary);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: var(--primary-hover);
    }
  </style>
</head>
<body>
  <main class="login-card">
    <h1>Login</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="textboxusername">UserName</label>
        <input id="textboxusername" name="textboxusername" type="text" placeholder="Enter username" />
      </div>
      <div class="form-group">
        <label for="textboxmatkhau">Password</label>
        <input id="textboxmatkhau" name="textboxmatkhau" type="password" placeholder="Enter password" />
      </div>
      <p id="errorMessage" class="error-message"></p>
      <button id="btnlogin" name="btnlogin" type="submit">Login</button>
    </form>
  </main>
  <script>
    const loginForm = document.getElementById("loginForm");
    const usernameInput = document.getElementById("textboxusername");
    const passwordInput = document.getElementById("textboxmatkhau");
    const errorMessage = document.getElementById("errorMessage");

    loginForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (username === "admin" && password === "admin") {
        window.location.href = "success.html";
        return;
      }

      errorMessage.textContent = "Sai ten dang nhap hoac mat khau.";
    });
  </script>
</body>
</html>
